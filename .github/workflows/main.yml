name: MacOS VNC

on: [push, workflow_dispatch]

jobs:
  vnc:
    runs-on: macos-latest

    steps:
      - name: Download ngrok (arm64)
        run: curl -sL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-arm64.zip -o ngrok.zip

      - name: Extract
        run: unzip ngrok.zip

      - name: Auth
        run: ./ngrok authtoken $NGROK_AUTH_TOKEN
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Enable Screen Sharing (VNC)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -users runner -privs -all -restart -agent

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvncpw -vncpw "P@ssw0rd!"

      - name: Create Tunnel
        run: ./ngrok tcp 5900
