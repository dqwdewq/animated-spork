name: MacOS VNC (RealVNC fixed)

on: [push, workflow_dispatch]

jobs:
  vnc:
    runs-on: macos-latest

    steps:
      - name: Download ngrok (arm64)
        run: curl -sL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-arm64.zip -o ngrok.zip

      - name: Extract
        run: unzip ngrok.zip

      - name: Auth ngrok
        run: ./ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Enable VNC Screen Sharing (исправлено auth error 2026)
        run: |
          echo "🔧 Включаем Screen Sharing + VNC с legacy-режимом..."

          # Устанавливаем пароль пользователю runner
          sudo dscl . -passwd /Users/runner "P@ssw0rd!"

          # Основная активация ARDAgent
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -users runner -privs -all -allowAccessFor -allUsers \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "P@ssw0rd!" \
            -restart -agent

          # Надёжное задание VNC-пароля через файл (работает на всех версиях macOS 13+)
          echo "P@ssw0rd!" | perl -we '
            BEGIN { @k = unpack "C*", pack "H*", "1734516E8BA8C5E2FF1C39567390ADCA" };
            $_ = <>; chomp; s/^(.{8}).*/$1/;
            @p = unpack "C*", $_;
            foreach (@k) { printf "%02X", $_ ^ (shift @p || 0) };
            print "\n"
          ' | sudo tee /Library/Preferences/com.apple.VNCSettings.txt >/dev/null

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent

          # Дополнительно запускаем сервис
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStartOnConsole -bool true

          echo "✅ VNC успешно включён!"
          echo "👤 Username: runner"
          echo "🔑 Password: P@ssw0rd!"
          echo "💡 В RealVNC Viewer обязательно поставь Encryption = Prefer Off"

      - name: Create ngrok Tunnel
        run: ./ngrok tcp 5900
