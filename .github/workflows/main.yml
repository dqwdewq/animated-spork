name: MacOS VNC (Fixed 2026)

on: [push, workflow_dispatch]

jobs:
  vnc:
    runs-on: macos-latest

    steps:
      - name: Download ngrok
        run: curl -sL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-arm64.zip -o ngrok.zip

      - name: Extract
        run: unzip ngrok.zip

      - name: Auth ngrok
        run: ./ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Enable VNC Screen Sharing (auth error исправлен!)
        run: |
          echo "🔧 Включаем Screen Sharing + VNC..."

          # Самый надёжный способ задать пароль на GitHub macOS runner
          echo "runner:P@ssw0rd!" | sudo chpasswd

          # Включаем VNC с legacy-режимом (для RealVNC Viewer)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -users runner -privs -all -allowAccessFor -allUsers \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "P@ssw0rd!" \
            -restart -agent

          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStartOnConsole -bool true

          echo "✅ VNC успешно включён!"
          echo "👤 Username: runner"
          echo "🔑 Password: P@ssw0rd!"

      - name: Create ngrok Tunnel
        run: ./ngrok tcp 5900
